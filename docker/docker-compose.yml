version: '3.8'

services:
  chmp:
    build:
      # Context is the repo root so the Dockerfile can COPY docker/entrypoint.sh.
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - USER_ID=${USER_ID:-1000}
        - GROUP_ID=${GROUP_ID:-1000}
        - USERNAME=${USERNAME:-user}
    image: chmp-workspace:latest
    container_name: chmp-ros2-cuda

    # Enable GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ---- Dev mounts: the core of the workflow ----
    volumes:
      # The chmp_workspace repo. src/, scripts/, and the colcon build/install/log
      # trees all live here.
      - ..:/workspace:rw
      # Core Python/JAX lib, mounted for an editable install into the venv.
      # Launch passes model_root:=/opt/chmp/models (the mounted core models dir).
      - ../../conformal_human_motion_prediction:/opt/chmp:rw
      # chmp_inference node package, dev-mounted directly into the colcon src tree
      # (nested bind over /workspace; vcs import leaves this path alone).
      - ../../chmp_inference:/workspace/src/chmp_inference:rw
      # Zenoh router config (see ZENOH_ROUTER_CONFIG_URI below).
      - ./router.json5:/ros2_ws/router.json5:ro
      # Preserve bash history across container recreations.
      - bash_history:/home/${USERNAME:-user}/.bash_history

    working_dir: /workspace

    # Keep container running
    stdin_open: true
    tty: true

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      # User configuration for entrypoint
      - LOCAL_USER_ID=${USER_ID:-1000}
      - LOCAL_GROUP_ID=${GROUP_ID:-1000}
      - LOCAL_USERNAME=${USERNAME:-user}
      # ROS2 networking
      - ROS_DOMAIN_ID=1
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_ROUTER_CONFIG_URI=/ros2_ws/router.json5
      # Shared GPU -> avoid jax's 75% pre-alloc OOM.
      - XLA_PYTHON_CLIENT_PREALLOCATE=false

    # Host networking for ROS2 / Zenoh discovery
    network_mode: host

    # IPC mode for shared memory (useful for ROS2)
    ipc: host

    # Start the Zenoh router. Open an interactive shell with docker/shell.sh.
    command: /bin/bash -c "source /opt/ros/jazzy/setup.bash && ros2 run rmw_zenoh_cpp rmw_zenohd"

    # Optional: X11 forwarding for GUI applications (RViz, etc.). Uncomment the
    # volume mounts below if you need GUI support.
    #   - /tmp/.X11-unix:/tmp/.X11-unix:rw
    #   - $HOME/.Xauthority:/home/${USERNAME:-user}/.Xauthority:rw

volumes:
  bash_history:
